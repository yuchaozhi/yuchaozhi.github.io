<script>
// BibTeX syntax highlighting function
function highlightBibtex(bibtexStr) {
  // Escape HTML special characters first
  var escaped = bibtexStr
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Highlight keywords (like @article, title, author, etc.)
  var highlighted = escaped.replace(/(@\w+)|(\b(title|author|journal|year|volume|number|pages|doi|publisher|dimensions|booktitle|organization)\b)/g, function(match) {
    return '<span class="bibtex-keyword">' + match + '</span>';
  });

  // Highlight identifiers (the citation key after @article{)
  highlighted = highlighted.replace(/@(\w+)\{([^,]+),/g, function(match, type, key) {
    return '<span class="bibtex-keyword">@' + type + '</span>{<span class="bibtex-identifier">' + key + '</span>,';
  });

  // Highlight strings (content inside braces)
  highlighted = highlighted.replace(/=\{([^}]+)\}/g, function(match, content) {
    return '={<span class="bibtex-string">' + content + '</span>}';
  });

  // Highlight braces
  highlighted = highlighted.replace(/[{}]/g, function(match) {
    return '<span class="bibtex-brace">' + match + '</span>';
  });

  return highlighted;
}

// BibTeX functionality
function toggleBibtex(id) {
  var content = document.getElementById(id);
  if (content.style.display === 'none') {
    content.style.display = 'block';
  } else {
    content.style.display = 'none';
  }
  return false; // Prevent default behavior
}

function copyBibtex(id) {
  var content = document.getElementById(id);
  var pre = content.querySelector('pre');
  var text = pre.textContent;
  var copyBtn = content.querySelector('.copy-btn');
  
  // Create a temporary textarea element
  var textarea = document.createElement('textarea');
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  
  try {
    // Copy the text to clipboard
    document.execCommand('copy');
    
    // Change icon to checkmark
    copyBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
    copyBtn.classList.add('copied');
    
    // Reset button after 2 seconds
    setTimeout(function() {
      copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>';
      copyBtn.classList.remove('copied');
    }, 2000);
    
  } catch (err) {
    console.error('Failed to copy text: ', err);
    alert('复制失败，请手动复制');
  }
  
  // Remove the temporary textarea
  document.body.removeChild(textarea);
}

// BibTeX database - 从 reference.bib 文件动态加载
var bibtexDatabase = {};

// 解析 BibTeX 条目的函数
function parseBibtexEntry(text) {
  var lines = text.split('\n');
  var result = {};
  var currentField = '';
  var currentValue = '';
  var inValue = false;
  
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    
    if (line === '') continue;
    
    // 处理字段定义
    var fieldMatch = line.match(/^(\w+)\s*=\s*\{?(.+?)\}?\,?$/);
    if (fieldMatch) {
      var fieldName = fieldMatch[1];
      var fieldValue = fieldMatch[2];
      result[fieldName] = fieldValue;
    }
  }
  
  return result;
}

// 从 reference.bib 文件加载 BibTeX 数据
function loadBibtexFromFile() {
  fetch('/reference.bib')
    .then(response => response.text())
    .then(data => {
      // 解析 BibTeX 文件
      var entries = data.split(/@\w+\{/);
      
      for (var i = 1; i < entries.length; i++) {
        var entry = entries[i];
        var keyMatch = entry.match(/^([^,]+),/);
        if (keyMatch) {
          var key = keyMatch[1].trim();
          var fields = {};
          
          // 提取各个字段
          var fieldMatches = entry.match(/(\w+)\s*=\s*\{([^}]+)\}/g);
          if (fieldMatches) {
            fieldMatches.forEach(function(match) {
              var fieldMatch = match.match(/(\w+)\s*=\s*\{([^}]+)\}/);
              if (fieldMatch) {
                fields[fieldMatch[1]] = fieldMatch[2];
              }
            });
          }
          
          // 重建 BibTeX 字符串
          var entryTypeMatch = entries[i-1].match(/@(\w+)\{/);
          var entryType = entryTypeMatch ? entryTypeMatch[1] : 'article';
          var bibtexStr = '@' + entryType + '{' + key + ',\n';
          var fieldNames = Object.keys(fields);
          for (var j = 0; j < fieldNames.length; j++) {
            var fieldName = fieldNames[j];
            var comma = (j < fieldNames.length - 1) ? ',' : '';
            bibtexStr += '  ' + fieldName + '={' + fields[fieldName] + '}' + comma + '\n';
          }
          bibtexStr += '}';
          
          bibtexDatabase[key] = bibtexStr;
        }
      }
      
      console.log('BibTeX 数据加载完成，共加载 ' + Object.keys(bibtexDatabase).length + ' 条条目');
      
      // 重新处理页面上的引用
      processCitations();
    })
    .catch(error => {
      console.error('加载 reference.bib 文件失败:', error);
    });
}

// Process \cite{} references when page loads
document.addEventListener('DOMContentLoaded', function() {
  // 首先尝试从 reference.bib 文件加载数据
  loadBibtexFromFile();
});

// 处理引用的函数
function processCitations() {
  // Find all text nodes containing \cite{...}
  var walker = document.createTreeWalker(
    document.body,
    NodeFilter.SHOW_TEXT,
    null,
    false
  );
  
  var textNodes = [];
  var node;
  while (node = walker.nextNode()) {
    if (node.textContent.includes('\\cite{')) {
      textNodes.push(node);
    }
  }
  
  // Process each text node
  textNodes.forEach(function(textNode) {
    var text = textNode.textContent;
    var parent = textNode.parentNode;
    
    // Find the publication entry container
    var publicationEntry = parent.closest('.publication-entry');
    
    // Replace \cite{key} with BibTeX button
    var citeRegex = /\\cite\{([^}]+)\}/g;
    var bibtexContents = [];
    var newHTML = text.replace(citeRegex, function(match, key) {
      if (bibtexDatabase[key]) {
        var uniqueId = 'bibtex-' + key + '-' + Math.random().toString(36).substr(2, 9);
        var highlightedBibtex = highlightBibtex(bibtexDatabase[key]);
        // Store BibTeX content to append later
        bibtexContents.push('<div id="' + uniqueId + '" class="bibtex-content" style="display: none;">' +
               '<pre>' + highlightedBibtex + '</pre>' +
               '<button class="copy-btn" onclick="copyBibtex(\'' + uniqueId + '\')"><i class="fa-regular fa-copy"></i></button>' +
               '</div>');
        return '<button class="action-btn bibtex-btn" onclick="toggleBibtex(\'' + uniqueId + '\')"><i class="fa-solid fa-quote-right"></i> BibTeX</button>';
      }
      return match; // Keep original if key not found
    });
    
    if (newHTML !== text) {
      var tempDiv = document.createElement('div');
      tempDiv.innerHTML = newHTML;
      while (tempDiv.firstChild) {
        parent.insertBefore(tempDiv.firstChild, textNode);
      }
      parent.removeChild(textNode);
      
      // Append BibTeX contents to the publication entry
      if (publicationEntry && bibtexContents.length > 0) {
        bibtexContents.forEach(function(content) {
          var contentDiv = document.createElement('div');
          contentDiv.innerHTML = content;
          publicationEntry.appendChild(contentDiv.firstChild);
        });
      }
    }
  });
}

// Publication Filter Functionality
document.addEventListener('DOMContentLoaded', function() {
  initPublicationFilter();
});

function initPublicationFilter() {
  var filterButtons = document.querySelectorAll('.pub-filter-btn');
  var publicationEntries = document.querySelectorAll('.publication-entry');
  var filterStatus = document.querySelector('.pub-filter-status');
  
  if (filterButtons.length === 0) return;
  
  filterButtons.forEach(function(button) {
    button.addEventListener('click', function() {
      var filter = this.getAttribute('data-filter');
      
      // Update active button
      filterButtons.forEach(function(btn) {
        btn.classList.remove('active');
      });
      this.classList.add('active');
      
      // Filter publications
      var visibleCount = 0;
      publicationEntries.forEach(function(entry) {
        var tags = entry.getAttribute('data-tags');
        
        if (filter === 'all' || (tags && tags.includes(filter))) {
          entry.classList.remove('hidden');
          visibleCount++;
        } else {
          entry.classList.add('hidden');
        }
      });
      
      // Update status text
      if (filterStatus) {
        if (filter === 'all') {
          filterStatus.textContent = 'Showing all papers.';
        } else {
          var filterName = this.textContent.replace(/\s*\d+\s*$/, '').trim();
          filterStatus.textContent = 'Showing ' + visibleCount + ' paper' + (visibleCount !== 1 ? 's' : '') + ' tagged with "' + filterName + '".';
        }
      }
    });
  });
}
</script>
